name: Auto Trade

on:
  # 注: GitHubのscheduleは遅延・間引きが激しく5分毎が成立しなかったため一旦停止。
  # 本番のスケジュール実行は「このPCのWindowsタスクスケジューラ(InvestBot)」が担当する
  # （scripts/run-bot.cmd を5分ごと）。二重稼働(DB食い違い)を避けるため schedule は無効化。
  # 必要時は下記 workflow_dispatch で手動実行できる。
  # schedule:
  #   - cron: "*/5 13-21 * * 1-5"   # 米国 UTC 13-21（月〜金）
  #   - cron: "*/5 0-6 * * 1-5"     # 日本 UTC 0-6（月〜金）
  workflow_dispatch:

# DB をリポジトリにコミットし戻すため書き込み権限が必要
permissions:
  contents: write

# 同時実行を防止（DBの競合回避）
concurrency:
  group: auto-trade
  cancel-in-progress: false

jobs:
  trade:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      # 売買判断の中核はルールエンジン（lib/rule-trade）で0トークン。
      # ニュースの読解だけ GROQ(LLM) を使う（1日1回・市場ごと）。キーが無い場合は
      # 自動でキーワード方式にフォールバックするため、未設定でも売買は止まらない。
      - name: Run trade cycle
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          GROQ_MODEL: llama-3.3-70b-versatile
        run: npm run trade

      - name: Commit updated database
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/sim.db
          if git diff --staged --quiet; then
            echo "変更なし"
          else
            git commit -m "auto-trade: $(date -u +%Y-%m-%dT%H:%MZ)"
            git push
          fi
