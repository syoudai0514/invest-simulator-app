name: Auto Trade

on:
  schedule:
    # 米国市場時間 UTC 13:30-20:00（日本時間 22:30-翌5:00）火〜土
    - cron: "*/5 13-20 * * 2-6"
  workflow_dispatch:

# DB をリポジトリにコミットし戻すため書き込み権限が必要
permissions:
  contents: write

# 同時実行を防止（DBの競合回避）
concurrency:
  group: auto-trade
  cancel-in-progress: false

jobs:
  trade:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run trade cycle
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          GROQ_MODEL: llama-3.3-70b-versatile
        run: npm run trade

      - name: Commit updated database
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/sim.db
          if git diff --staged --quiet; then
            echo "変更なし"
          else
            git commit -m "auto-trade: $(date -u +%Y-%m-%dT%H:%MZ)"
            git push
          fi
