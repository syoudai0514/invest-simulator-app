name: Auto Trade

on:
  schedule:
    # 米国市場(ET 9:30-16:00)= UTC 13:00-21:59 に5分ごと（月〜金）。冬夏時間込みで余裕を確保。
    - cron: "*/5 13-21 * * 1-5"
    # 日本市場(JST 9:00-15:00)= UTC 0:00-6:59 に5分ごと（月〜金）。
    - cron: "*/5 0-6 * * 1-5"
    # 実際の開場判定は lib/market が各市場のタイムゾーン基準で行い、時間外は記録のみ。
  workflow_dispatch:

# DB をリポジトリにコミットし戻すため書き込み権限が必要
permissions:
  contents: write

# 同時実行を防止（DBの競合回避）
concurrency:
  group: auto-trade
  cancel-in-progress: false

jobs:
  trade:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      # 本番は決定論ルールエンジン（lib/rule-trade）で動作。GROQ等のLLMキーは不要。
      - name: Run trade cycle
        run: npm run trade

      - name: Commit updated database
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/sim.db
          if git diff --staged --quiet; then
            echo "変更なし"
          else
            git commit -m "auto-trade: $(date -u +%Y-%m-%dT%H:%MZ)"
            git push
          fi
